name: Deploy Docs

on:
  pull_request:
    branches:
      - main
    paths:
      - "apps/docs/**"
      - "packages/**"
      - "package.json"
      - "bun.lock"
      - "turbo.json"
      - ".github/workflows/docs-deploy.yml"
  push:
    branches:
      - main
    paths:
      - "apps/docs/**"
      - "packages/**"
      - "package.json"
      - "bun.lock"
      - "turbo.json"
      - ".github/workflows/docs-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy-preview:
    name: Deploy preview
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment:
      name: docs-preview
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Vercel CLI
        run: bun add --global vercel@latest

      - name: Pull Vercel preview environment
        working-directory: apps/docs
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build docs for Vercel preview
        working-directory: apps/docs
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy docs preview
        id: deploy
        working-directory: apps/docs
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Preview deployment: $url"

  deploy-production:
    name: Deploy production
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: docs-production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Vercel CLI
        run: bun add --global vercel@latest

      - name: Pull Vercel production environment
        working-directory: apps/docs
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build docs for Vercel production
        working-directory: apps/docs
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy docs production
        id: deploy
        working-directory: apps/docs
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Production deployment: $url"
