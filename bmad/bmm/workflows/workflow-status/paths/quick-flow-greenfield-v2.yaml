# BMad Quick Flow V2 - Greenfield (Alternative)
# Fast implementation path with slightly different workflow selection

method_name: "BMad Quick Flow - Lean"
track: "quick-flow"
field_type: "greenfield"
description: "Lean tech-spec based implementation for greenfield projects with minimal discovery"

phases:
  - phase: 0
    name: "Discovery (Minimal)"
    optional: true
    workflows:
      - id: "research"
        optional: true
        agent: "analyst"
        command: "research"
        included_by: "user_choice"
        note: "Lightweight research only"

  - phase: 1
    name: "Planning & Specification"
    required: true
    workflows:
      - id: "tech-spec"
        required: true
        agent: "pm"
        command: "tech-spec"
        output: "Technical Specification"
        note: "Lean spec with focus on MVP features"

  - phase: 2
    name: "Execution"
    required: true
    workflows:
      - id: "sprint-planning"
        required: true
        agent: "sm"
        command: "sprint-planning"
        note: "Sprint planning with tight scope"
